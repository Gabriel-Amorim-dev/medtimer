{% extends 'base.html' %}
{% block conteudo %}
<div class="card p-4 col-md-5 mx-auto mt-5 text-center">
  <h5>Remover "{{ nome }}"?</h5>
  <p class="text-muted">O historico de doses sera mantido.</p>
  <form method="post" class="d-flex gap-2 justify-content-center">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmar</button>
    <a href="{% url 'med_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
